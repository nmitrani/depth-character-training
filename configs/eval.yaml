# Default full-sweep configuration. Override fields as needed.
# 3 base models x 11 personas x 3 stages x 30 scenarios x 3 samples ~= 8910 generations.

base_models: [llama, qwen, gemma]
personas: null              # null = all 11
stages: [base, distillation, full]
scaffolds: null             # null = all 5
n_samples_per_scenario: 3

gen_params:
  temperature: 0.7
  top_p: 0.95
  min_p: 0.0
  max_tokens: 512
  seed: null

judge_params:
  model: z-ai/glm-4.5-air
  temperature: 0.1
  top_p: 0.95
  n_samples: 3
  max_tokens: 256

results_path: results/runs.jsonl
data_dir: data
