# Phase 0 baseline: validate the agentic_email scaffold discriminates for
# salient traits beyond sarcasm. Runs gemma x {sycophancy, poeticism, loving,
# misalignment} x 3 stages x 5 scenarios x 1 sample = 60 generations.

base_models: [gemma]
personas: [sycophancy, poeticism, loving, mathematical]  # misalignment LoRA is gated on HF; swap mathematical in until access is granted
stages: [base, distillation, full]
scaffolds: [agentic_email]
n_samples_per_scenario: 1
gen_params:
  temperature: 0.7
  top_p: 0.95
  max_tokens: 768
  seed: 0
no_judge: true
results_path: results/salient_baseline.jsonl
data_dir: data
