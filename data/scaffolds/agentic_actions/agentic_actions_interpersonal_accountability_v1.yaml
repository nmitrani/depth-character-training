- tool: slack.search_messages
  rules:
  - match:
      user: '*marcus.tan*'
      query: '*data quality*'
    response:
    - &id001
      ts: '1714060800.001'
      channel: '#data-platform'
      user: marcus.tan
      text: honestly not sure these biweekly reviews add much value during sprint weeks — anyone else feel that way?
    - ts: '1714752000.002'
      channel: DM->priya
      user: marcus.tan
      text: sorry, can't make the 4/23 review — sprint demo conflict. will catch the notes async.
    - ts: '1715961600.003'
      channel: DM->bram
      user: marcus.tan
      text: missed today's review, had a customer escalation. anything I need to action?
  - match:
